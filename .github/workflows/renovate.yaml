name: renovate
run-name: renovate
on:
  workflow_dispatch:
  schedule:
    - cron: '30 * * * *'
  push:
    branches:
      - main
    paths:
      - ".github/renovate.json"
      - ".github/workflows/renovate.yaml"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: renovate

jobs:
  renovate:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Run Renovate
        run: npx --yes renovate@43
        env:
          RENOVATE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RENOVATE_PLATFORM: github
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_PLATFORM_COMMIT: enabled
          RENOVATE_ONBOARDING: "false"
          RENOVATE_PR_HOURLY_LIMIT: "0"
          LOG_LEVEL: info
