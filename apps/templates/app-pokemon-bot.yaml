apiVersion: v1
kind: Namespace
metadata:
  name: pokemon-bot
  labels:
    name: pokemon-bot
---
# -- RBAC for GitLab runner deploy step ----------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pokemon-bot-deployer
  namespace: pokemon-bot
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitlab-runner-pokemon-bot-deploy
  namespace: pokemon-bot
subjects:
  - kind: ServiceAccount
    name: gitlab-ci-job
    namespace: gitlab-runner
roleRef:
  kind: Role
  name: pokemon-bot-deployer
  apiGroup: rbac.authorization.k8s.io
---
# -- Secrets ------------------------------------------------------------------
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: db-secret
  namespace: pokemon-bot
data:
  password: {{ .Values.db.password | b64enc | quote }}
---
apiVersion: v1
kind: Secret
type: kubernetes.io/dockerconfigjson
metadata:
  name: gitlab-registry-secret
  namespace: pokemon-bot
data:
  .dockerconfigjson: {{ .Values.pokemon_bot.registry | quote }}
---
# -- RabbitMQ -----------------------------------------------------------------
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: pokemon-bot
spec:
  serviceName: rabbitmq
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management-alpine
          ports:
            - containerPort: 5672
            - containerPort: 15672
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: guest
            - name: RABBITMQ_DEFAULT_PASS
              value: guest
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
  volumeClaimTemplates:
    - metadata:
        name: rabbitmq-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: pokemon-bot
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
---
# -- Database init job ---------------------------------------------------------
apiVersion: batch/v1
kind: Job
metadata:
  name: pokemon-bot-db-init
  namespace: pokemon-bot
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      containers:
        - name: db-init
          image: postgres:16-alpine
          env:
            - name: PGHOST
              value: postgresql.db-system.svc.cluster.local
            - name: PGUSER
              value: postgres
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: password
          command:
            - sh
            - -c
            - |
              for db in pokemon_scraper pokemon_notifications pokemon_checkout; do
                psql -tc "SELECT 1 FROM pg_database WHERE datname = '$db'" | grep -q 1 || psql -c "CREATE DATABASE $db"
              done
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
      restartPolicy: OnFailure
---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: dashboard-secret
  namespace: pokemon-bot
data:
  password: {{ .Values.pokemon_bot.dashboard_password | b64enc | quote }}
  jwt-secret: {{ .Values.pokemon_bot.dashboard_jwt_secret | b64enc | quote }}
---
# -- Dashboard backend --------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-backend
  namespace: pokemon-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-backend
  template:
    metadata:
      labels:
        app: dashboard-backend
    spec:
      imagePullSecrets:
        - name: gitlab-registry-secret
      containers:
        - name: dashboard-backend
          image: registry.gitlab.com/thomvandevin-projects/pokemon-bot/dashboard-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: DASHBOARD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dashboard-secret
                  key: password
            - name: DASHBOARD_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: dashboard-secret
                  key: jwt-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-backend
  namespace: pokemon-bot
spec:
  selector:
    app: dashboard-backend
  ports:
    - port: 8080
      targetPort: 8080
---
# -- Dashboard frontend -------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-frontend
  namespace: pokemon-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-frontend
  template:
    metadata:
      labels:
        app: dashboard-frontend
