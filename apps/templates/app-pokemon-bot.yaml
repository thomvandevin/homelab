# -- Tailscale Ingress (internal only) ----------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pokemon-scraper
  namespace: pokemon-bot
spec:
  ingressClassName: tailscale
  rules:
    - http:
        paths:
          - backend:
              service:
                name: scraper-frontend
                port:
                  number: 80
            path: "/"
            pathType: Prefix
  tls:
    - hosts:
        - pokemon-scraper
---
