          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-frontend
  namespace: pokemon-bot
spec:
  selector:
    app: dashboard-frontend
  ports:
    - port: 80
      targetPort: 80
---
# -- Scraper backend ----------------------------------------------------------
