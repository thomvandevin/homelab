      containers:
        - name: scraper-backend
          image: registry.gitlab.com/thomvandevin-projects/pokemon-bot/scraper-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgresql.db-system.svc.cluster.local:5432/pokemon_scraper
            - name: SPRING_DATASOURCE_USERNAME
              value: postgres
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: password
            - name: SPRING_RABBITMQ_HOST
              value: rabbitmq.pokemon-bot.svc.cluster.local
            - name: SPRING_RABBITMQ_PORT
              value: "5672"
            - name: SPRING_RABBITMQ_USERNAME
              value: guest
            - name: SPRING_RABBITMQ_PASSWORD
              value: guest
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: scraper-backend
  namespace: pokemon-bot
spec:
  selector:
    app: scraper-backend
  ports:
    - port: 8081
