apiVersion: v1
kind: Namespace
metadata:
  name: limitless-tournament-decks
  labels:
    name: limitless-tournament-decks
---
# -- RBAC for GitLab runner deploy step ----------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: limitless-tournament-decks-deployer
  namespace: limitless-tournament-decks
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitlab-runner-limitless-tournament-decks-deploy
  namespace: limitless-tournament-decks
subjects:
  - kind: ServiceAccount
    name: gitlab-ci-job
    namespace: gitlab-runner
roleRef:
  kind: Role
  name: limitless-tournament-decks-deployer
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: db-secret
  namespace: limitless-tournament-decks
data:
  password: {{ .Values.db.password | b64enc | quote }}
---
apiVersion: v1
kind: Secret
type: kubernetes.io/dockerconfigjson
metadata:
  name: gitlab-registry-secret
  namespace: limitless-tournament-decks
data:
  .dockerconfigjson: {{ .Values.gitlab.registry | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: limitless-tournament-decks
  namespace: limitless-tournament-decks
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: limitless-tournament-decks
  template:
    metadata:
      labels:
        app: limitless-tournament-decks
    spec:
      imagePullSecrets:
        - name: gitlab-registry-secret
      containers:
        - name: limitless-tournament-decks
          image: registry.gitlab.com/thomvandevin-projects/limitless-tournament-decks:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: POSTGRES_HOST
              value: postgresql.db-system.svc.cluster.local
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: limitless_tournaments_db
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: password
            - name: DATABASE_URL
              value: postgresql://postgres:$(POSTGRES_PASSWORD)@postgresql.db-system.svc.cluster.local:5432/limitless_tournaments_db
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: limitless-tournament-decks-svc
  namespace: limitless-tournament-decks
spec:
  type: ClusterIP
  selector:
    app: limitless-tournament-decks
  ports:
    - name: http
      port: 80
      targetPort: 3000
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: limitless-preload-onepiece
  namespace: limitless-tournament-decks
spec:
  schedule: "0 */3 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: curl
              image: curlimages/curl:latest@sha256:7c12af72ceb38b7432ab85e1a265cff6ae58e06f95539d539b654f2cfa64bb13
              args:
                - curl
                - -X
                - GET
                - http://limitless-tournament-decks-svc.limitless-tournament-decks.svc.cluster.local/preload?game=OP&maxTournaments=20&preloadStandings=true&preloadDecklists=true&maxDecksPerTournament=-1
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
          restartPolicy: OnFailure
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: limitless-preload-pokemon
  namespace: limitless-tournament-decks
spec:
  schedule: "0 */3 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: curl
              image: curlimages/curl:latest@sha256:7c12af72ceb38b7432ab85e1a265cff6ae58e06f95539d539b654f2cfa64bb13
              args:
                - curl
                - -X
                - GET
                - http://limitless-tournament-decks-svc.limitless-tournament-decks.svc.cluster.local/preload?game=PTCG&maxTournaments=20&preloadStandings=true&preloadDecklists=true&maxDecksPerTournament=-1
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
          restartPolicy: OnFailure
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: limitless-cleanup
  namespace: limitless-tournament-decks
spec:
  schedule: "0 2 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: curl
              image: curlimages/curl:latest@sha256:7c12af72ceb38b7432ab85e1a265cff6ae58e06f95539d539b654f2cfa64bb13
              args:
                - curl
                - -X
                - GET
                - http://limitless-tournament-decks-svc.limitless-tournament-decks.svc.cluster.local/cleanup
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
          restartPolicy: OnFailure
