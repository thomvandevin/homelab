apiVersion: v1
kind: Namespace
metadata:
  name: swiss-rounds
  labels:
    name: swiss-rounds
---
# -- RBAC for GitLab runner deploy step ----------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: swiss-rounds-deployer
  namespace: swiss-rounds
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitlab-runner-swiss-rounds-deploy
  namespace: swiss-rounds
subjects:
  - kind: ServiceAccount
    name: gitlab-ci-job
    namespace: gitlab-runner-swiss-rounds
roleRef:
  kind: Role
  name: swiss-rounds-deployer
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Secret
type: kubernetes.io/dockerconfigjson
metadata:
  name: gitlab-registry-secret
  namespace: swiss-rounds
data:
  .dockerconfigjson: {{ .Values.gitlab.registry | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: swiss-rounds
  namespace: swiss-rounds
spec:
  replicas: 1
  selector:
    matchLabels:
      app: swiss-rounds
  template:
    metadata:
      labels:
        app: swiss-rounds
    spec:
      imagePullSecrets:
        - name: gitlab-registry-secret
      containers:
        - name: swiss-rounds
          image: registry.gitlab.com/swiss-rounds/swiss-rounds:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
            - containerPort: 8443
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: swiss-rounds-svc
  namespace: swiss-rounds
spec:
  type: ClusterIP
  selector:
    app: swiss-rounds
  ports:
    - name: http
      port: 80
      targetPort: 8080
    - name: https
      port: 443
      targetPort: 8443
