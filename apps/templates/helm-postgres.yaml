apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: db-secret
  namespace: db-system
data:
  password: {{ .Values.db.password | b64enc | quote }}
---
apiVersion: v1
kind: Secret
type: kubernetes.io/dockerconfigjson
metadata:
  name: gitlab-registry-secret
  namespace: db-system
data:
  .dockerconfigjson: {{ .Values.pokemon_ai.registry | quote }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgresql
  namespace: argocd
spec:
  project: default
  syncPolicy:
    automated:
      prune: true
    syncOptions:
      - CreateNamespace=true
  source:
    repoURL: registry-1.docker.io/bitnamicharts
    chart: postgresql
    targetRevision: 16.7.27
    helm:
      valuesObject:
        image:
          registry: registry.gitlab.com
          repository: thomvandevin-projects/pokemon-ai/postgresql
          tag: latest
          pullSecrets:
            - gitlab-registry-secret
        primary:
          resources:
            limits:
              cpu: 250m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
        global:
          postgresql:
            auth:
              existingSecret: db-secret
              secretKeys:
                adminPasswordKey: password
  destination:
    namespace: db-system
    server: https://kubernetes.default.svc
