apiVersion: v1
kind: Namespace
metadata:
  name: flaresolverr
  labels:
    name: flaresolverr
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flaresolverr
  namespace: flaresolverr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flaresolverr
  template:
    metadata:
      labels:
        app: flaresolverr
    spec:
      containers:
        - name: flaresolverr
          image: ghcr.io/flaresolverr/flaresolverr:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8191
          env:
            - name: LOG_LEVEL
              value: info
            - name: TZ
              value: Europe/Amsterdam
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            # Headless Chromium solving Cloudflare challenges is memory- and CPU-hungry;
            # the previous 1Gi limit / 256Mi shm caused OOM restarts and
            # "session not created: chrome not reachable" crashes under load.
            limits:
              cpu: "2"
              memory: 3Gi
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: flaresolverr
  namespace: flaresolverr
spec:
  type: ClusterIP
  selector:
    app: flaresolverr
  ports:
    - name: http
      port: 8191
      targetPort: 8191
