apiVersion: v1
kind: Namespace
metadata:
  name: pokemon-ai
  labels:
    name: pokemon-ai
---
# -- RBAC for GitLab runner deploy step ----------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pokemon-ai-deployer
  namespace: pokemon-ai
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: [""]
    resources: ["pods", "pods/exec"]
    verbs: ["get", "list", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitlab-runner-pokemon-ai-deploy
  namespace: pokemon-ai
subjects:
  - kind: ServiceAccount
    name: gitlab-ci-job
    namespace: gitlab-runner
roleRef:
  kind: Role
  name: pokemon-ai-deployer
  apiGroup: rbac.authorization.k8s.io
---
# -- Secrets ------------------------------------------------------------------
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: db-secret
  namespace: pokemon-ai
data:
  password: {{ .Values.db.password | b64enc | quote }}
---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: api-secret
  namespace: pokemon-ai
data:
  openrouter-api-key: {{ .Values.pokemon_ai.openrouter_api_key | b64enc | quote }}
  openai-api-key: {{ .Values.pokemon_ai.openai_api_key | b64enc | quote }}
  app-password: {{ .Values.pokemon_ai.app_password | b64enc | quote }}
---
apiVersion: v1
kind: Secret
type: kubernetes.io/dockerconfigjson
metadata:
  name: gitlab-registry-secret
  namespace: pokemon-ai
data:
  .dockerconfigjson: {{ .Values.pokemon_ai.registry | quote }}
---
# -- PostgreSQL (pgvector) ----------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql
  namespace: pokemon-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
        - name: postgresql
          image: pgvector/pgvector:0.8.2-pg17
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: pokemon_ai
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 512Mi
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: pokemon-ai
spec:
  selector:
    app: postgresql
  ports:
    - port: 5432
      targetPort: 5432
---
# -- Chat API (formerly backend) ----------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-api
  namespace: pokemon-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-api
  template:
    metadata:
      labels:
        app: chat-api
    spec:
      imagePullSecrets:
        - name: gitlab-registry-secret
      containers:
        - name: chat-api
          image: registry.gitlab.com/thomvandevin-projects/pokemon-ai/chat-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              value: postgresql.pokemon-ai.svc.cluster.local
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: pokemon_ai
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: password
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: openrouter-api-key
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: openai-api-key
            - name: APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: app-password
            - name: CARD_API_URL
              value: "http://card-api.pokemon-ai.svc.cluster.local:8081"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: chat-api
  namespace: pokemon-ai
spec:
  selector:
    app: chat-api
  ports:
    - port: 8080
      targetPort: 8080
---
# -- Card API ----------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: card-api
  namespace: pokemon-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: card-api
  template:
    metadata:
      labels:
        app: card-api
    spec:
      imagePullSecrets:
        - name: gitlab-registry-secret
      initContainers:
        - name: create-db
          image: postgres:17-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgresql.pokemon-ai.svc.cluster.local -p 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
              PGPASSWORD=$DB_PASSWORD psql -h postgresql.pokemon-ai.svc.cluster.local -U postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'pokemon_cards'" | grep -q 1 || PGPASSWORD=$DB_PASSWORD psql -h postgresql.pokemon-ai.svc.cluster.local -U postgres -c "CREATE DATABASE pokemon_cards"
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: password
      containers:
        - name: card-api
          image: registry.gitlab.com/thomvandevin-projects/pokemon-ai/card-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: DB_HOST
              value: postgresql.pokemon-ai.svc.cluster.local
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: pokemon_cards
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: password
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: card-api
  namespace: pokemon-ai
spec:
  selector:
    app: card-api
  ports:
    - port: 8081
      targetPort: 8081
---
# -- Chat UI (formerly frontend) ----------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-ui
  namespace: pokemon-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-ui
  template:
    metadata:
      labels:
        app: chat-ui
    spec:
      imagePullSecrets:
        - name: gitlab-registry-secret
      containers:
        - name: chat-ui
          image: registry.gitlab.com/thomvandevin-projects/pokemon-ai/chat-ui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: chat-ui
  namespace: pokemon-ai
spec:
  selector:
    app: chat-ui
  ports:
    - port: 80
      targetPort: 80
---
# -- MCP Server ---------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: pokemon-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
    spec:
      imagePullSecrets:
        - name: gitlab-registry-secret
      containers:
        - name: mcp-server
          image: registry.gitlab.com/thomvandevin-projects/pokemon-ai/mcp-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: CARD_API_URL
              value: "http://card-api.pokemon-ai.svc.cluster.local:8081"
            - name: CHAT_API_URL
              value: "http://chat-api.pokemon-ai.svc.cluster.local:8080"
            - name: APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: app-password
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-server
  namespace: pokemon-ai
spec:
  selector:
    app: mcp-server
  ports:
    - port: 3001
      targetPort: 3001
---
# -- Showcase UI (G Block) ---------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: showcase-ui
  namespace: pokemon-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: showcase-ui
  template:
    metadata:
      labels:
        app: showcase-ui
    spec:
      imagePullSecrets:
        - name: gitlab-registry-secret
      containers:
        - name: showcase-ui
          image: registry.gitlab.com/thomvandevin-projects/pokemon-ai/showcase-ui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: showcase-ui
  namespace: pokemon-ai
spec:
  selector:
    app: showcase-ui
  ports:
    - port: 80
      targetPort: 80
---
# -- Tailscale Ingress (internal only) ----------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pokemon-ai
  namespace: pokemon-ai
spec:
  ingressClassName: tailscale
  rules:
    - http:
        paths:
          - backend:
              service:
                name: chat-ui
                port:
                  number: 80
            path: "/"
            pathType: Prefix
  tls:
    - hosts:
        - pokemon-ai
