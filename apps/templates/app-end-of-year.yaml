apiVersion: v1
kind: Namespace
metadata:
  name: end-of-year
  labels:
    name: end-of-year
---
# -- RBAC for GitLab runner deploy step ----------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: end-of-year-deployer
  namespace: end-of-year
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitlab-runner-end-of-year-deploy
  namespace: end-of-year
subjects:
  - kind: ServiceAccount
    name: gitlab-ci-job
    namespace: gitlab-runner
roleRef:
  kind: Role
  name: end-of-year-deployer
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Secret
type: kubernetes.io/dockerconfigjson
metadata:
  name: gitlab-registry-secret
  namespace: end-of-year
data:
  .dockerconfigjson: {{ .Values.gitlab.registry | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: end-of-year
  namespace: end-of-year
spec:
  replicas: 0
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: end-of-year
  template:
    metadata:
      labels:
        app: end-of-year
    spec:
      imagePullSecrets:
        - name: gitlab-registry-secret
      containers:
        - name: end-of-year
          image: registry.gitlab.com/thomvandevin-projects/end-of-year:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: end-of-year-svc
  namespace: end-of-year
spec:
  type: ClusterIP
  selector:
    app: end-of-year
  ports:
    - name: http
      port: 80
      targetPort: 3000
